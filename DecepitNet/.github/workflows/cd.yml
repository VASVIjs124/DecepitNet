name: CD - Continuous Deployment

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Deception Engine
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.deception-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/deception-engine:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: Build and push ML Pipeline
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.ml-pipeline
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-pipeline:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name deceptinet-staging --region us-east-1
      
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/deception-engine deception-engine=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/deception-engine:${{ github.sha }} -n deceptinet
          kubectl set image deployment/ml-pipeline ml-pipeline=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-pipeline:${{ github.sha }} -n deceptinet
          kubectl rollout status deployment/deception-engine -n deceptinet
          kubectl rollout status deployment/ml-pipeline -n deceptinet

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name deceptinet-production --region us-east-1
      
      - name: Deploy to Production Kubernetes
        run: |
          kubectl set image deployment/deception-engine deception-engine=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/deception-engine:${{ github.sha }} -n deceptinet
          kubectl set image deployment/ml-pipeline ml-pipeline=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-pipeline:${{ github.sha }} -n deceptinet
          kubectl rollout status deployment/deception-engine -n deceptinet
          kubectl rollout status deployment/ml-pipeline -n deceptinet
      
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "DECEPTINET Production Deployment Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *DECEPTINET Production Deployment*\nVersion: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
