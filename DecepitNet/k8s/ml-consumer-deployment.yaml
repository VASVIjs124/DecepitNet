---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-consumer
  namespace: deceptinet
  labels:
    app: ml-consumer
    component: ml-pipeline
spec:
  replicas: 2  # Multiple consumers for parallel processing
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ml-consumer
  template:
    metadata:
      labels:
        app: ml-consumer
        component: ml-pipeline
        version: v1.0.0
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ml-consumer
              topologyKey: kubernetes.io/hostname
      containers:
      - name: ml-consumer
        image: deceptinet/ml-consumer:latest
        imagePullPolicy: IfNotPresent
        env:
        # ConfigMap references
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: KAFKA_TOPIC
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_TOPIC
        - name: KAFKA_GROUP_ID
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_GROUP_ID
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_PORT
        # Optimization settings
        - name: MODEL_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: MODEL_CACHE_SIZE
        - name: KAFKA_BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_BATCH_SIZE
        - name: KAFKA_BATCH_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_BATCH_TIMEOUT
        - name: REDIS_CACHE_TTL_ML
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_CACHE_TTL_ML
        # Secret references
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - "ml/kafka_consumer.py"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pgrep
            - -f
            - "ml/kafka_consumer.py"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: logs
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-consumer-hpa
  namespace: deceptinet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-consumer
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 30
