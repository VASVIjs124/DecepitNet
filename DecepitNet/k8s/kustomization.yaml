---
# Kustomization file for DecepitNet Kubernetes deployment
# Use: kubectl apply -k .

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deceptinet

resources:
  # Namespace
  - namespace.yaml
  
  # Configuration
  - configmap.yaml
  - secrets.yaml
  - resource-quota.yaml
  
  # Infrastructure
  - postgresql-deployment.yaml
  - redis-deployment.yaml
  - kafka-deployment.yaml
  
  # Applications
  - deception-engine-deployment.yaml
  - ml-consumer-deployment.yaml
  - main-platform-deployment.yaml
  
  # Networking
  - ingress.yaml
  - network-policy.yaml
  
  # Monitoring (optional)
  # - monitoring.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: deceptinet
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

# Common annotations
commonAnnotations:
  description: "DecepitNet Cyber Deception Platform"
  owner: "security-team"
  environment: "production"

# Images (override with kustomize edit set image)
images:
  - name: deceptinet/deception-engine
    newTag: latest
  - name: deceptinet/ml-consumer
    newTag: latest
  - name: deceptinet/platform
    newTag: latest

# ConfigMap generator (alternative to configmap.yaml)
# Uncomment to generate ConfigMap from files
# configMapGenerator:
#   - name: deceptinet-config
#     literals:
#       - POSTGRES_HOST=postgresql-service
#       - POSTGRES_PORT=5432
#       - REDIS_HOST=redis-service
#       - REDIS_PORT=6379

# Secret generator (alternative to secrets.yaml)
# Uncomment to generate Secrets from files
# WARNING: Don't commit actual secrets to git!
# secretGenerator:
#   - name: deceptinet-secrets
#     literals:
#       - POSTGRES_USER=deceptinet
#       - POSTGRES_PASSWORD=changeme

# Patches (for environment-specific customization)
# patchesStrategicMerge:
#   - patches/production.yaml

# Replicas (can override in overlays)
# replicas:
#   - name: deception-engine
#     count: 5
#   - name: ml-consumer
#     count: 4
