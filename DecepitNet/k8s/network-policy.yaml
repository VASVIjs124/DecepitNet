---
# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: deceptinet
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# Allow deception-engine to access PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-deception-engine-to-postgresql
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: deception-engine
    - podSelector:
        matchLabels:
          app: ml-consumer
    - podSelector:
        matchLabels:
          app: deceptinet-platform
    ports:
    - protocol: TCP
      port: 5432
---
# Allow services to access Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-redis
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: deception-engine
    - podSelector:
        matchLabels:
          app: ml-consumer
    - podSelector:
        matchLabels:
          app: deceptinet-platform
    ports:
    - protocol: TCP
      port: 6379
---
# Allow services to access Kafka
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-kafka
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: deception-engine
    - podSelector:
        matchLabels:
          app: ml-consumer
    - podSelector:
        matchLabels:
          app: deceptinet-platform
    ports:
    - protocol: TCP
      port: 9092
---
# Allow Kafka to access Zookeeper
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-to-zookeeper
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: zookeeper
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 2181
---
# Allow ingress controller to access services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-services
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: deception-engine
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-dashboard
  namespace: deceptinet
spec:
  podSelector:
    matchLabels:
      app: deceptinet-platform
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
