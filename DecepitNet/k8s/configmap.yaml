---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deceptinet-config
  namespace: deceptinet
data:
  # Database Configuration
  POSTGRES_HOST: "postgresql-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "deceptinet"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  KAFKA_TOPIC: "honeypot-events"
  KAFKA_GROUP_ID: "deceptinet-ml-consumer"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Elasticsearch Configuration
  ELASTICSEARCH_HOST: "elasticsearch-service"
  ELASTICSEARCH_PORT: "9200"
  
  # Deception Engine Configuration
  DECEPTION_ENGINE_HOST: "0.0.0.0"
  DECEPTION_ENGINE_PORT: "8000"
  
  # Optimization Configuration
  MODEL_CACHE_SIZE: "10"
  DB_POOL_MIN_SIZE: "10"
  DB_POOL_MAX_SIZE: "50"
  KAFKA_BATCH_SIZE: "200"
  KAFKA_BATCH_TIMEOUT: "3.0"
  REDIS_CACHE_TTL_API: "300"
  REDIS_CACHE_TTL_ML: "600"
  REDIS_CACHE_TTL_DB: "300"
  
  # Application Mode
  APP_MODE: "full"
  ENABLE_DASHBOARD: "true"
  DASHBOARD_PORT: "5000"
  
  # Logging
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
