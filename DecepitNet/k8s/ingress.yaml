---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deceptinet-ingress
  namespace: deceptinet
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - deceptinet.yourdomain.com
    - api.deceptinet.yourdomain.com
    - dashboard.deceptinet.yourdomain.com
    secretName: deceptinet-tls
  rules:
  # Deception Engine API
  - host: api.deceptinet.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deception-engine-service
            port:
              number: 8000
  # Main Dashboard
  - host: dashboard.deceptinet.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deceptinet-dashboard-service
            port:
              number: 5000
  # Main domain (redirect to dashboard)
  - host: deceptinet.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deceptinet-dashboard-service
            port:
              number: 5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: deception-engine-service
            port:
              number: 8000
