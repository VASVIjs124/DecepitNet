---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: deceptinet-quota
  namespace: deceptinet
spec:
  hard:
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
    services.nodeports: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: deceptinet-limits
  namespace: deceptinet
spec:
  limits:
  - max:
      cpu: "8"
      memory: "16Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
    type: Container
  - max:
      cpu: "16"
      memory: "32Gi"
    min:
      cpu: "200m"
      memory: "256Mi"
    type: Pod
