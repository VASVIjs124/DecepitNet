---
apiVersion: v1
kind: Secret
metadata:
  name: deceptinet-secrets
  namespace: deceptinet
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "deceptinet"
  POSTGRES_PASSWORD: "changeme_production_password"
  
  # MISP Integration
  MISP_URL: "https://misp.example.com"
  MISP_API_KEY: "your_misp_api_key_here"
  
  # OpenCTI Integration
  OPENCTI_URL: "https://opencti.example.com"
  OPENCTI_TOKEN: "your_opencti_token_here"
  
  # Redis Password (if enabled)
  REDIS_PASSWORD: ""
  
  # API Keys
  API_SECRET_KEY: "your_secret_key_here_change_in_production"
  JWT_SECRET_KEY: "your_jwt_secret_key_here_change_in_production"
---
# Note: In production, use sealed secrets or external secret management
# kubectl create secret generic deceptinet-secrets \
#   --from-literal=POSTGRES_PASSWORD=<strong-password> \
#   --from-literal=MISP_API_KEY=<misp-key> \
#   --from-literal=OPENCTI_TOKEN=<opencti-token> \
#   --namespace=deceptinet
