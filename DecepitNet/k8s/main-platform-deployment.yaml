---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deceptinet-platform
  namespace: deceptinet
  labels:
    app: deceptinet-platform
    component: main
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: deceptinet-platform
  template:
    metadata:
      labels:
        app: deceptinet-platform
        component: main
        version: v1.0.0
    spec:
      containers:
      - name: platform
        image: deceptinet/platform:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: dashboard
          protocol: TCP
        env:
        # ConfigMap references
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: APP_MODE
        - name: ENABLE_DASHBOARD
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: ENABLE_DASHBOARD
        - name: DASHBOARD_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DASHBOARD_PORT
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_DB
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: LOG_LEVEL
        # Optimization settings
        - name: MODEL_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: MODEL_CACHE_SIZE
        - name: DB_POOL_MIN_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DB_POOL_MIN_SIZE
        - name: DB_POOL_MAX_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DB_POOL_MAX_SIZE
        # Secret references
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_PASSWORD
        args:
        - "--mode"
        - "full"
        - "--dashboard"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/stats
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/stats
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: models
          mountPath: /app/models
        - name: templates
          mountPath: /app/templates
      volumes:
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: templates
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: deceptinet-dashboard-service
  namespace: deceptinet
  labels:
    app: deceptinet-platform
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: dashboard
  selector:
    app: deceptinet-platform
