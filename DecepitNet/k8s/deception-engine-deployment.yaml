---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deception-engine
  namespace: deceptinet
  labels:
    app: deception-engine
    component: api
spec:
  replicas: 3  # High availability with 3 replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: deception-engine
  template:
    metadata:
      labels:
        app: deception-engine
        component: api
        version: v1.0.0
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - deception-engine
              topologyKey: kubernetes.io/hostname
      containers:
      - name: deception-engine
        image: deceptinet/deception-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # ConfigMap references
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_PORT
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: DECEPTION_ENGINE_PORT
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DECEPTION_ENGINE_PORT
        # Optimization settings
        - name: REDIS_CACHE_TTL_API
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: REDIS_CACHE_TTL_API
        - name: DB_POOL_MIN_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DB_POOL_MIN_SIZE
        - name: DB_POOL_MAX_SIZE
          valueFrom:
            configMapKeyRef:
              name: deceptinet-config
              key: DB_POOL_MAX_SIZE
        # Secret references
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: POSTGRES_PASSWORD
        - name: MISP_URL
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: MISP_URL
        - name: MISP_API_KEY
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: MISP_API_KEY
        - name: OPENCTI_URL
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: OPENCTI_URL
        - name: OPENCTI_TOKEN
          valueFrom:
            secretKeyRef:
              name: deceptinet-secrets
              key: OPENCTI_TOKEN
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: models
          mountPath: /app/models
      volumes:
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: deceptinet
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: Service
metadata:
  name: deception-engine-service
  namespace: deceptinet
  labels:
    app: deception-engine
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: deception-engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deception-engine-hpa
  namespace: deceptinet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deception-engine
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
