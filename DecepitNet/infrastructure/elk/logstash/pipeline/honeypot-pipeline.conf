# ==============================================================================
# DECEPTINET LOGSTASH PIPELINE
# Honeypot telemetry processing and enrichment
# ==============================================================================

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
    codec => json
  }
  
  # Direct TCP input for custom honeypots
  tcp {
    port => 5000
    codec => json_lines
    type => "honeypot"
  }
}

filter {
  # ============================================================================
  # PARSE TIMESTAMP
  # ============================================================================
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }

  # ============================================================================
  # ENRICH WITH GEOIP
  # ============================================================================
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
      database => "/usr/share/logstash/GeoLite2-City.mmdb"
      fields => ["city_name", "country_name", "country_code2", "location", "timezone"]
    }
    
    # ASN lookup
    geoip {
      source => "source_ip"
      target => "asn"
      database => "/usr/share/logstash/GeoLite2-ASN.mmdb"
    }
  }

  # ============================================================================
  # COWRIE SSH HONEYPOT LOGS
  # ============================================================================
  if [type] == "cowrie" {
    json {
      source => "message"
      target => "cowrie"
    }
    
    # Extract session info
    if [cowrie][session] {
      mutate {
        add_field => { "session_id" => "%{[cowrie][session]}" }
      }
    }
    
    # Extract credentials
    if [cowrie][username] and [cowrie][password] {
      mutate {
        add_field => {
          "credential_username" => "%{[cowrie][username]}"
          "credential_password" => "%{[cowrie][password]}"
        }
      }
    }
    
    # Extract command
    if [cowrie][input] {
      mutate {
        add_field => { "command" => "%{[cowrie][input]}" }
      }
    }
    
    # Calculate threat score
    ruby {
      code => "
        threat_score = 0
        event.get('cowrie').each do |key, value|
          threat_score += 10 if ['session.connect', 'login.failed'].include?(key)
          threat_score += 30 if ['login.success', 'command.input'].include?(key)
          threat_score += 50 if ['session.file_download', 'direct-tcpip.request'].include?(key)
        end
        event.set('threat_score', threat_score)
      "
    }
  }

  # ============================================================================
  # DIONAEA MALWARE HONEYPOT LOGS
  # ============================================================================
  if [type] == "dionaea" {
    json {
      source => "message"
      target => "dionaea"
    }
    
    # Extract connection info
    if [dionaea][connection_type] {
      mutate {
        add_field => { "protocol" => "%{[dionaea][connection_type]}" }
      }
    }
    
    # Mark malware downloads
    if [dionaea][download] {
      mutate {
        add_field => {
          "malware_sample" => "%{[dionaea][download][md5]}"
          "threat_level" => "critical"
        }
        add_tag => ["malware"]
      }
    }
  }

  # ============================================================================
  # CUSTOM HONEYPOT LOGS
  # ============================================================================
  if [type] == "honeypot" {
    # Already in JSON format from our custom honeypots
    
    # Classify threat level based on protocol and payload
    if [protocol] == "ssh" and [payload] =~ /sudo|rm -rf|chmod/ {
      mutate {
        replace => { "threat_level" => "high" }
      }
    }
    
    if [protocol] == "http" and [payload] =~ /(union|select|script|iframe|eval)/ {
      mutate {
        replace => { "threat_level" => "high" }
        add_tag => ["web_attack"]
      }
    }
  }

  # ============================================================================
  # MITRE ATT&CK MAPPING
  # ============================================================================
  ruby {
    code => '
      tactics = []
      techniques = []
      
      payload = event.get("payload").to_s.downcase
      command = event.get("command").to_s.downcase
      
      # T1595 - Active Scanning
      if payload =~ /nmap|masscan|zmap/ or command =~ /scan|probe/
        tactics << "reconnaissance"
        techniques << "T1595"
      end
      
      # T1110 - Brute Force
      if event.get("event_type") == "login.failed" or payload =~ /hydra|medusa/
        tactics << "credential_access"
        techniques << "T1110"
      end
      
      # T1059 - Command and Scripting Interpreter
      if command =~ /bash|sh|python|perl|powershell/
        tactics << "execution"
        techniques << "T1059"
      end
      
      # T1003 - OS Credential Dumping
      if command =~ /\/etc\/shadow|\/etc\/passwd|mimikatz/
        tactics << "credential_access"
        techniques << "T1003"
      end
      
      # T1486 - Data Encrypted for Impact
      if payload =~ /encrypt|ransomware/ or command =~ /openssl enc|gpg/
        tactics << "impact"
        techniques << "T1486"
      end
      
      event.set("mitre_tactics", tactics.uniq) unless tactics.empty?
      event.set("mitre_techniques", techniques.uniq) unless techniques.empty?
    '
  }

  # ============================================================================
  # THREAT INTEL ENRICHMENT (PLACEHOLDER)
  # ============================================================================
  # TODO: Add MISP/OpenCTI enrichment in Sprint 6-8
  # translate {
  #   source => "source_ip"
  #   target => "threat_intel"
  #   dictionary_path => "/etc/logstash/threat_intel.yml"
  # }

  # ============================================================================
  # NORMALIZE FIELDS
  # ============================================================================
  mutate {
    # Convert threat level to numeric score
    gsub => [
      "threat_level", "critical", "100",
      "threat_level", "high", "75",
      "threat_level", "medium", "50",
      "threat_level", "low", "25"
    ]
    
    # Add metadata
    add_field => {
      "[@metadata][index_prefix]" => "deceptinet"
      "platform" => "deceptinet"
      "processed_at" => "%{@timestamp}"
    }
    
    # Remove raw message to save space
    remove_field => ["message"]
  }
}

output {
  # ============================================================================
  # ELASTICSEARCH OUTPUT
  # ============================================================================
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "deceptinet-honeypot-%{+YYYY.MM.dd}"
    document_type => "_doc"
    
    # Template management
    template_name => "deceptinet-honeypot"
    template => "/usr/share/logstash/templates/deceptinet-honeypot-template.json"
    template_overwrite => true
  }

  # ============================================================================
  # KAFKA OUTPUT for ML Processing
  # ============================================================================
  kafka {
    bootstrap_servers => "kafka:9092"
    topic_id => "honeypot-events"
    codec => json
    compression_type => "snappy"
  }

  # ============================================================================
  # STDOUT for Debugging (remove in production)
  # ============================================================================
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }
}
